                <div class="grid gap-5 sm:grid-cols-2">
                    <div>
                        <label for="name" class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="contact.nameLabel"></label>
                        <input type="text" id="name" name="name" placeholder="" data-i18n-placeholder="contact.namePh" required class="input-field w-full px-4 py-3 rounded-xl bg-card border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="contact.emailLabel"></label>
                        <input type="email" id="email" name="email" placeholder="" data-i18n-placeholder="contact.emailPh" required class="input-field w-full px-4 py-3 rounded-xl bg-card border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow">
                    </div>
                </div>
                <div>
                    <label for="temat" class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="contact.subjectLabel"></label>
                    <input type="text" id="temat" name="temat" placeholder="" data-i18n-placeholder="contact.subjectPh" required class="input-field w-full px-4 py-3 rounded-xl bg-card border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow">
                </div>
                <div>
                    <label for="tresc" class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="contact.bodyLabel"></label>
                    <textarea id="tresc" name="tresc" rows="5" placeholder="" data-i18n-placeholder="contact.bodyPh" maxlength="500" required class="input-field w-full px-4 py-3 rounded-xl bg-card border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow resize-none"></textarea>
                    <p class="mt-2 text-sm text-zinc-500"><span id="charCount">0/500</span></p>
                </div>
                <div id="formMessage"></div>
                <button type="submit" class="w-full sm:w-auto px-8 py-3.5 rounded-xl bg-accent text-white font-semibold hover:bg-accent-hover transition-colors" data-i18n="contact.submit"></button>
            </form>
        </div>
    </section>
